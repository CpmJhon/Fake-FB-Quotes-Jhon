<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>QuickFake · Mockup Generator Instan</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <div class="bg-gradient"></div>

    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-bolt"></i>
                <h1>Quick<span>Fake</span></h1>
            </div>
            <p class="tagline">Generator mockup kekinian • hasil instan • gratis</p>
        </header>

        <div class="main-card">
            <!-- Pilihan Format -->
            <div class="format-section">
                <label><i class="fas fa-layer-group"></i> Pilih Format Mockup</label>
                <div class="format-grid" id="formatGrid">
                    <!-- diisi JS -->
                </div>
            </div>

            <!-- Parameter Form -->
            <div class="param-section">
                <label><i class="fas fa-sliders-h"></i> Isi Parameter</label>
                <div class="param-form" id="paramForm">
                    <!-- form dinamis -->
                </div>
            </div>

            <!-- Tombol Generate & Hasil -->
            <div class="action-section">
                <button id="generateBtn" class="btn-generate"><i class="fas fa-magic"></i> Generate Sekarang</button>
                <div id="resultArea" class="result-area">
                    <div class="result-placeholder">
                        <i class="fas fa-image"></i>
                        <p>Hasil mockup akan tampil di sini</p>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>⚡ QuickFake — gunakan dengan bijak untuk keperluan kreatif & edukasi</p>
        </footer>
    </div>

    <script src="script.js"></script>
    <script src="download.js"></script>
</body>
</html>
